<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>RCvisions Repair Pro Staff</title><link rel="stylesheet" href="style.css"></head><body><div class="top"><div class="brand"><span>RCvisions</span> Repair Pro</div><div class="row"><button onclick="show('dash')">Dashboard</button><button onclick="show('new')">New Repair</button><button onclick="show('settings')">Settings</button></div></div><div class="wrap"><div id="login" class="card"><h2>Staff Login</h2><input id="pin" placeholder="Staff PIN" type="password"><button onclick="login()">Login</button><p id="loginMsg"></p></div><div id="app" class="hidden"><section id="dash" class="card"><h2>Repair Dashboard</h2><input id="search" placeholder="Search ticket, name, phone, model" oninput="loadRepairs()"><div id="list"></div></section><section id="new" class="card hidden"><h2>New Repair Ticket</h2><div class="grid"><input id="customerName" placeholder="Customer name"><input id="phone" placeholder="Phone"><input id="email" placeholder="Email"><input id="brand" placeholder="Brand"><input id="model" placeholder="Model"><select id="status"><option>Received</option><option>Diagnosing</option><option>Waiting on Parts</option><option>Repair in Progress</option><option>Ready for Pickup</option><option>Completed</option><option>Picked Up</option></select></div><p><textarea id="problem" placeholder="Problem reported"></textarea></p><p><textarea id="notes" placeholder="Technician notes"></textarea></p><div class="grid"><input id="labor" type="number" step="0.01" placeholder="Labor amount"><input id="partName" placeholder="Part name"><input id="sku" placeholder="SKU"><input id="qty" type="number" value="1" placeholder="Qty"><input id="price" type="number" step="0.01" placeholder="Price"></div><p class="muted">For v1, add one part at ticket creation. You can edit JSON later; multi-part editor is next.</p><button class="red" onclick="createRepair()">Create Repair Ticket</button><p id="newMsg"></p></section><section id="settings" class="card hidden"><h2>Settings</h2><p class="muted">Use test mode first. Live Gmail needs a Google App Password, not your normal password.</p><div class="grid"><select id="emailMode"><option value="test">Test Mode</option><option value="live">Live Gmail</option></select><input id="emailUser" placeholder="Gmail address"><input id="emailPass" placeholder="Gmail app password" type="password"><input id="emailFrom" placeholder="From name/email"><input id="publicUrl" placeholder="Public URL, ex: http://localhost:3000"><input id="staffPin" placeholder="Staff PIN"><input id="taxRate" type="number" step="0.0001" placeholder="Tax rate ex .0775"></div><p><button onclick="saveSettings()">Save Settings</button></p><p id="settingsMsg"></p></section><section id="edit" class="card hidden"><h2>Edit Repair <span id="eTicket"></span></h2><div class="grid"><select id="eStatus"><option>Received</option><option>Diagnosing</option><option>Waiting on Parts</option><option>Repair in Progress</option><option>Ready for Pickup</option><option>Completed</option><option>Picked Up</option></select><input id="eLabor" type="number" step="0.01"><input id="ePaid" placeholder="Paid? yes/no"></div><p><textarea id="eNotes"></textarea></p><p class="total" id="eTotal"></p><div class="row"><button onclick="saveEdit()">Save</button><button class="red" onclick="emailUpdate()">Send Email Update</button><button class="light" onclick="window.print()">Print</button></div><p id="editMsg"></p></section></div></div><script src="staff.js"></script></body></html>
